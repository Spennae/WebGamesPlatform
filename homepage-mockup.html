<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomePage Mockup</title>
  <style>
    :root {
      --bg-primary: #1e1e2e;
      --bg-secondary: #181825;
      --surface: #2b2c3f;
      --surface-soft: #313244;
      --highlight: #45475a;
      --text-primary: #cdd6f4;
      --text-secondary: #a6adc8;
      --accent-blue: #89b4fa;
      --accent-mauve: #cba6f7;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-10: 2.5rem;
      --radius-sm: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
    .mockup-container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .navbar-glass { background: rgba(24, 24, 37, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--surface); position: sticky; top: 0; z-index: 50; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .nav-left { display: flex; align-items: center; gap: 32px; }
    .nav-brand { font-size: 18px; font-weight: 700; color: var(--text-primary); text-decoration: none; letter-spacing: -0.5px; }
    .nav-menu { display: flex; gap: 4px; }
    .nav-menu-item { color: var(--text-secondary); text-decoration: none; padding: 8px 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; transition: all 150ms ease; }
    .nav-menu-item:hover { color: var(--text-primary); background: var(--surface); }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .btn { padding: 8px 16px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 150ms ease; text-decoration: none; display: inline-block; }
    .btn-ghost { background: transparent; color: var(--text-secondary); }
    .btn-ghost:hover { background: var(--surface); color: var(--text-primary); }
    .btn-primary { background: var(--accent-blue); color: var(--bg-primary); }
    .btn-primary:hover { filter: brightness(1.1); }

    .page-header { text-align: center; margin-bottom: var(--space-10); }
    .page-title { font-size: 2.25rem; font-weight: 600; color: var(--text-primary); margin-bottom: var(--space-2); }
    .page-subtitle { font-size: 1rem; color: var(--text-secondary); }

    .game-grid { display: grid; grid-template-columns: 1fr; max-width: 400px; margin: 0 auto; gap: 1.5rem; }

    .game-card { background-color: var(--surface); border-radius: var(--radius-lg); padding: var(--space-6); transition: all 150ms ease; }
    .game-card:hover { background-color: var(--surface-soft); }
    .game-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-3); }
    .game-card-title { font-size: 1.125rem; font-weight: 600; color: var(--text-primary); margin-bottom: var(--space-2); }
    .game-card-description { color: var(--text-secondary); font-size: 0.875rem; margin-bottom: var(--space-4); line-height: 1.5; }
    .tag { padding: 2px 8px; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
    .tag-blue { background: var(--accent-blue); color: var(--bg-primary); }
  </style>
</head>
<body>
  <div class="mockup-container">
    <nav class="navbar-glass">
      <div class="nav-left">
        <a href="#" class="nav-brand">WebGames</a>
        <div class="nav-menu">
          <a href="#" class="nav-menu-item" style="background: var(--surface); color: var(--text-primary);">Games</a>
          <a href="#" class="nav-menu-item">Leaderboards</a>
        </div>
      </div>
      <div class="nav-right">
        <a href="#" class="btn btn-ghost">Sign In</a>
        <a href="#" class="btn btn-primary">Get Started</a>
      </div>
    </nav>

    <div style="max-width: 1000px; margin: 0 auto; padding: 48px 16px;">
      <div class="page-header">
        <h1 class="page-title">Available Games</h1>
        <p class="page-subtitle">Choose a game and start playing</p>
      </div>

      <div class="game-grid">
        <div class="game-card">
          <div class="game-card-header">
            <h2 class="game-card-title">TypeRacer</h2>
            <span class="tag tag-blue">New</span>
          </div>
          <p class="game-card-description">Test your typing speed and accuracy in this fast-paced racing game. Race against the clock to type texts as quickly as possible.</p>
          <a href="#" class="btn btn-primary" style="width: 100%; text-align: center;">Play Now</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
