services:
  mysql:
    image: mysql:8.0
    container_name: webgames_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - webgames_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api/PlatformApi
      dockerfile: Dockerfile
    container_name: webgames_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=root;Password=${MYSQL_ROOT_PASSWORD};"
      EngineUrl__Typeracer: "http://typeracer:8081"
    ports:
      - "5000:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - webgames_network

  typeracer:
    build:
      context: ./engines/typeracer
      dockerfile: Dockerfile
    container_name: webgames_typeracer
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - webgames_network

networks:
  webgames_network:
    driver: bridge

volumes:
  mysql_data:
